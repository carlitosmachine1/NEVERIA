    <style>
      body {
        background-color: #F8FAFC;
        user-select: none; /* Prevent text selection for touch interface feel */
        overscroll-behavior: none;
      }
      /* Custom Scrollbar for touch friendliness */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 4px;
      }
      
      @media print {
        @page {
          margin: 0;
          size: auto;
        }
        body * {
          visibility: hidden;
        }
        #printable-receipt, #printable-receipt * {
          visibility: visible;
        }
        #printable-receipt {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          margin: 0;
          padding: 0;
        }
      }
    </style>
